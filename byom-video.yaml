project:
  name: byom-video-project

python:
  interpreter: .venv/bin/python

transcription:
  enabled: true
  model_size: tiny

captions:
  enabled: true

chunks:
  enabled: true
  target_seconds: 30
  max_gap_seconds: 2.0

highlights:
  enabled: true
  top_k: 10
  min_duration_seconds: 3
  max_duration_seconds: 90

roughcut:
  enabled: true
  max_clips: 5

ffmpeg_script:
  enabled: true
  output_format: mp4

report:
  enabled: true

models:
  enabled: false

  entries:
    local_qwen:
      provider: ollama
      model: qwen2.5:7b
      role: expander
      base_url: http://localhost:11434
      options:
        temperature: 0.2

    premium_reasoner:
      provider: openai
      model: gpt-4.1
      role: reasoner
      api_key_env: OPENAI_API_KEY
      options:
        temperature: 0.1
        max_tokens: 1200

  routes:
    highlight_reasoning: premium_reasoner
    goal_reranking: local_qwen
    caption_expansion: local_qwen
    timeline_labeling: local_qwen
    verification: premium_reasoner
